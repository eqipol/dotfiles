[mgr]
ratio          = [ 1, 3, 4 ]
sort_by        = "mtime"
sort_sensitive = false
sort_reverse 	 = true
sort_dir_first = true
sort_translit  = false
linemode       = "size"
show_hidden    = false
show_symlink   = true
scrolloff      = 5
mouse_events   = [ "click", "scroll" ]
title_format   = "Yazi: {cwd}"


[preview]
wrap            = "no"
tab_size        = 2
max_width       = 1200
max_height      = 1500
cache_dir       = ""
image_delay     = 30
image_filter    = "triangle"
image_quality   = 90

[opener]
edit = [
	{ run = "${EDITOR:-nvim} %s", desc = "$EDITOR",      for = "unix", block = true },
]
open = [
	{ run = "qview %s1",    desc = "Open", for = "linux" },
]
play = [
	{ run = "mpv %s1",    desc = "Play", for = "linux", orphan = true },
]