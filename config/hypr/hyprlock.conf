# Автоматически сгенерирован скриптом allwal.sh

general {
    hide_cursor = true
    #no_fade_in = false
    #grace = 0
    # disable_loading_bar = true
}

background {
    monitor =
    path = /home/npc/Изображения/wallp/nekoxl-86973596-4107828369.png
    blur_passes = 2
}

# -- pywal colors --
source = /home/npc/.cache/wal/colors-hyprland

# -- time --
label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%H:%M")"
    color = 0xff8f939a
    font_size = 80
    font_family = JetBrains Mono ExtraBold
    position = 0, 100
    halign = center
    valign = center
}

# -- quote --
label {
    monitor =
    text = - PAIN IS REAL, BUT SO IS HOPE -
    color = 0xffb45f78
    font_size = 12
    font_family = JetBrains Mono ExtraLight
    position = 0, 160
    halign = center
    valign = center
}

# -- greeting --
label {
    monitor =
    text = Hey npc :3
    color = 0xff8f939a
    font_size = 20
    font_family = JetBrains Mono Light
    position = 0, 0
    halign = center
    valign = center
}

# -- password input --
input-field {
    monitor =
    size = 230, 40
    outline_thickness = 0
    dots_size = 0.2
    dots_spacing = 0.4
    dots_center = true
    inner_color = 0xff89213e
    font_color = 0xff8f939a
    fade_on_empty = false
    placeholder_text = <span foreground='white'><i>unlock the magic...</i></span>
    fail_color = 0xff8f939a
    hide_input = false
    position = 0, -50
    halign = center
    valign = center
}
