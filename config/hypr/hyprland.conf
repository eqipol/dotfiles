#disable_logs = false
# -- execute at launch --
exec-once = swww-daemon
exec-once = waybar & nm-applet --indicator
exec-once = hypridle
exec-once = swaync -c ~/.config/swaync/config.json -s ~/.config/swaync/style.css
#exec-once = hyprpaper
#exec-once = wal -R

# autostart for me
exec-once = [workspace 1 silent] zen-browser
exec-once = [workspace 2 silent] Telegram


exec-once=dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP

exec-once = wl-paste --type text --watch cliphist store # Stores only text data
exec-once = wl-paste --type image --watch cliphist store # Stores only image data
exec-once = wl-clip-persist --clipboard --primary

# -- pywal colors --
#source = ~/.config/wal/templates/colors-hyprland

source=~/.config/hypr/frappe.conf

# -- monitor --
monitor=,preferred,auto,auto
#monitor=DP-3, 2560x1440@144.00Hz, 0x0, 1 # or 1.25 for my monitor

# env
env = GDK_SCALE,1.1              # GTK-приложения (firefox, thunar и т.д.)
env = QT_SCALE_FACTOR,1.1        # Qt-приложения
env = QT_AUTO_SCREEN_SCALE_FACTOR,1.1
env = XCURSOR_SIZE,32
env = HYPRSHOT_DIR,/home/npc/Изображения/Screenshots
#env = XDG_CURRENT_DESKTOP,GNOME
#env = DESKTOP_SESSION,gnome


# -- programs --
$terminal = foot
$fileManager = foot yazi %u
$menu = rofi -combi-modi window,drun,ssh -show drun -font "hack 14" -icon-theme "Papirus" -show-icons

# -- environment variables --

general {
    gaps_in = 5
    gaps_out = 8
    border_size = 0
    layout = dwindle
    allow_tearing = false
}

decoration {
    rounding = 5
    active_opacity = 0.99
    inactive_opacity = 0.92
    fullscreen_opacity = 1
    blur {
        enabled = false
        size = 3
        passes = 1
    }
}

input {
    kb_layout = us,ru
    kb_variant =
    kb_model =
    kb_options = grp:alt_shift_toggle,caps:escape_shifted_capslock
    kb_rules =
    follow_mouse = 1
    touchpad {
        natural_scroll = no
    }
    sensitivity = 0 # -1.0 to 1.0; 0 means no modification.
}

animations {
    enabled = yes
    bezier = myBezier, 0.05, 0.9, 0.1, 1.05
    animation = windows, 1, 7, myBezier
    animation = windowsOut, 1, 7, default, popin 80%
    animation = border, 1, 10, default
    animation = borderangle, 1, 8, default
    animation = fade, 1, 7, default
    animation = workspaces, 1, 6, default
}

dwindle {
    pseudotile = yes
    preserve_split = yes
}

master {
    new_status = master
}

#gestures {
#    workspace_swipe = false
#}

misc {
    force_default_wallpaper = 0
    disable_hyprland_logo = true
}

# -- keybinds --

$mainMod = SUPER

bind = $mainMod, RETURN, exec, $terminal
bind = $mainMod, Q, killactive, # "Quit"
bind = $mainMod, F, fullscreen,
#bind = $mainMod, V, togglefloating,
bind = $mainMod, A, exec, $menu # "Apps"
bind = $mainMod, D, pseudo, # dwindle
bind = $mainMod, J, togglesplit, # dwindle
bind = $mainMod, E, exec, $fileManager
bind = $mainMod SHIFT, R, exec, hyprctl reload,
bind = $mainMod, L, exec, hyprlock

# waybar
bind = $mainMod SHIFT, B, exec, ~/.config/waybar/launch.sh
bind = $mainMod, B, exec, killall -SIGUSR1 waybar

# wallpaper/swww
# bind = $mainMod, W, exec, ~/.config/hypr/scripts/wallpaper.sh

# wlogout
bind = $mainMod, M, exec, wlogout -b 2

# switch workspaces
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10
bind = $mainMod, TAB, workspace, e+1

# move active window to a workspace
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# move focus
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# scroll through existing workspaces
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# move/resize windows
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod SHIFT, mouse:272, resizewindow

bind = $mainMod SHIFT, right, resizeactive, 30 0
bind = $mainMod SHIFT, left, resizeactive, -30 0
bind = $mainMod SHIFT, up, resizeactive, 0 -30
bind = $mainMod SHIFT, down, resizeactive, 0 30

bind = $mainMod SHIFT, L, moveactive, 30 0
bind = $mainMod SHIFT, I, moveactive, -30 0
bind = $mainMod SHIFT, O, moveactive, 0 -30
bind = $mainMod SHIFT, K, moveactive, 0 30

# volumes
bind = , XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bind = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bind = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bind = , XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle

# screenshots
#bind = $mainMod, P, exec, grimblast save screen
#bind = $mainMod ALT, P, exec, sleep 5 && grimblast save screen
#bind = $mainMod CTRL, P, exec, grimblast --cursor save screen
bind = $mainMod SHIFT, S, exec, hyprshot -m region

# steam
#windowrulev2 = opacity 1.0 1.0, class:^(steam)$
#windowrulev2 = noblur, class:^(steam)$
#windowrulev2 = noanim, class:^(steam)$
#windowrulev2 = stayfocused, title:^()$,class:^(steam)$
#windowrulev2 = minsize 1 1, title:^()$,class:^(steam)$

# Telegram

# clipboard
bind = SUPER, V, exec, cliphist list | rofi -dmenu -display-columns 2 | cliphist decode | wl-copy
